    <style>
        :root { --gold: #d4af37; --bg: #000; --card: #121212; --green: #25D366; --text: #e0e0e0; }
        body { background: var(--bg); margin: 0; font-family:'Hind Siliguri', sans-serif; font-display: swap; color: var(--text); overflow: hidden; }
        
        /* ২. ক্রিটিক্যাল সিএসএস (লোডার) */
        #loader { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #111; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { background: rgba(18, 18, 18, 0.95); padding: 10px 0; border-bottom: 1px solid #222; text-align: center; z-index: 1000; }
        .main-title { color: var(--gold); font-size: 1rem; margin: 0; font-weight: 600; }
        
        /* Swiper কাস্টমাইজেশন */
        .swiper { width: 100vw; height: calc(100vh - 140px); }
        .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        .product-card { width: 95%; height: 85%; background: #080808; border-radius: 12px; border: 1px solid #222; position: relative; overflow: hidden; }
        .product-card img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 11px; z-index: 10; }
        
        .actions { display: flex; gap: 8px; width: 95%; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 13px; border: none; cursor: pointer; text-align: center; }
        .btn-details { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-order { background: var(--green); color: #fff; }

        /* ড্রয়ার স্টাইল */
        .drawer { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--card); z-index: 4000; border-top: 2px solid var(--gold); border-radius: 20px 20px 0 0; padding: 20px; transition: 0.3s; }
        .drawer.active { bottom: 0; }
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3500; display: none; }
        
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #181818; border: 1px solid #333; color: #fff; border-radius: 6px; }
        footer { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; padding: 8px 0; border-top: 1px solid #222; overflow: hidden; }
        .marquee { white-space: nowrap; animation: move 15s linear infinite; color: var(--gold); font-size: 11px; }
        @keyframes move { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>
    <audio id="flipSound" src="https://cdn.jsdelivr.net/gh/horitokidev/horitoki-catalogue@main/sound.mp3" preload="auto"></audio>

    <header>
        <h1 class="main-title">হরিতকী EID ক্যাটালগ ২০২৬</h1>
        <div id="pCount" style="font-size:10px; color:#666;">১/১৪০</div>
    </header>

    <div class="swiper">
        <div class="swiper-wrapper" id="mainWrapper">
            </div>
        <div style="color:var(--gold)" class="swiper-button-next"></div>
        <div style="color:var(--gold)" class="swiper-button-prev"></div>
    </div>

    <div class="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="mainDrawer">
        <div id="detailsContent">
            <h3 style="color:var(--gold); margin:0;">পণ্যের বিবরণ</h3>
            <p style="color:#aaa; font-size: 14px;">ম্যাটেরিয়াল: প্রিমিয়াম গ্লোসি সিল্ক শাড়ি। খুব আরামদায়ক।  <br>দৈর্ঘ্য: ১২ হাত <br>১০০% কালার গ্যারান্টি <br>রানিং ব্লাউস পিস নেই  <br>মূল্য: <b>1690 টাকা</b> (ফিক্সড)।</p>
            <button class="btn btn-order" style="width:100%;" onclick="showOrder()">অর্ডার করতে এগিয়ে যান</button>
        </div>
        <div id="orderContent" style="display:none;">
    <h3 style="color:var(--gold); margin:0;">অর্ডার (কোড: <span id="targetID">0</span>)</h3>
    <input type="text" id="custName" placeholder="আপনার নাম">
    <input type="tel" id="custPhone" placeholder="মোবাইল নম্বর">
    <textarea id="custAddr" placeholder="ঠিকানা"></textarea>
    
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn" style="background:#25D366; color:#fff; flex:1;" onclick="handleOrder('wa')">WhatsApp</button>
        <button class="btn" style="background:#0084FF; color:#fff; flex:1;" onclick="handleOrder('ms')">Messenger</button>
    </div>
</div>
        <button onclick="closeDrawer()" style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;">বন্ধ করুন</button>
    </div>

    <footer><div class="marquee">হরিতকী স্পেশাল অফার: যেকোনো শাড়ি ১৬৯০  টাকা! ক্যাশ অন ডেলিভারি সারাদেশে।</div></footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        const total = 140;
        const repo = "https://cdn.jsdelivr.net/gh/horitokidev/horitoki-catalogue@main/images/";
        const snd = document.getElementById('flipSound');

        // ড্রয়ার ফাংশন
        function openDrawer(id) {
            $('#targetID').text(id);
            $('.drawer-overlay').fadeIn(200);
            $('#mainDrawer').addClass('active');
            $('#detailsContent').show(); $('#orderContent').hide();
        }
        function showOrder() { $('#detailsContent').hide(); $('#orderContent').show(); }
        function closeDrawer() { $('.drawer-overlay').fadeOut(200); $('#mainDrawer').removeClass('active'); }
        
        function handleOrder(platform) {
    const id = $('#targetID').text(), 
          n = $('#custName').val(), 
          p = $('#custPhone').val(), 
          a = $('#custAddr').val();
    
    if(!n || !p || !a) return alert('সব তথ্য দিয়ে সহযোগিতা করুন');

    // প্রোডাক্টের সরাসরি লিঙ্ক তৈরি (বড় স্ক্রিনে বা শেয়ার করার জন্য)
    const productLink = `https://catalog.horitoki.com/?id=${id}`;

    // লাইন-বাই-লাইন মেসেজ ফরম্যাট
    const message = `🛍️ *নতুন অর্ডার (ক্যাটালগ)*\n` +
                    `-----------------------\n` +
                    `🔗 প্রোডাক্ট লিঙ্ক: ${productLink}\n` +
                    `📦 প্রোডাক্ট কোড: ${id}\n` +
                    `👤 নাম: ${n}\n` +
                    `📞 ফোন: ${p}\n` +
                    `📍 ঠিকানা: ${a}\n` +
                    `-----------------------\n` +
                    `অর্ডারটি কনফার্ম করতে চাই।`;

    if(platform === 'wa') {
        const waMsg = message.replace(/\n/g, '%0A');
        window.open(`https://wa.me/8801309007585?text=${waMsg}`);
    } else {
        window.open(`https://m.me/horitokibd?text=${encodeURIComponent(message)}`);
    }
}

        // ৫. ডাইনামিক ইমেজ রেন্ডারিং (Lazy Ingestion)
        $(document).ready(function() {
    // ১. ইউআরএল থেকে আইডি চেক করা (যেমন: ?id=45)
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = parseInt(urlParams.get('id'));

    let ids = Array.from({length: total}, (_, i) => i + 1);
    
    // ২. লজিক: যদি নির্দিষ্ট আইডি থাকে তবে সেটা আগে, নাহলে শাফেল
    if (targetId && targetId > 0 && targetId <= total) {
        // টার্গেট আইডি-কে লিস্ট থেকে সরিয়ে সবার সামনে নিয়ে আসা
        ids = ids.filter(i => i !== targetId);
        ids.unshift(targetId); 
    } else {
        // সাধারণ ভিজিটরদের জন্য র‍্যান্ডম শাফেল
        ids.sort(() => Math.random() - 0.5);
    }

    // ৩. ডাইনামিক প্রিলোড (সবার আগে ১ম ইমেজটি লোড করার কমান্ড)
    const firstImageSrc = `${repo}${ids[0]}.webp`;
    const preloadLink = document.createElement('link');
    preloadLink.rel = 'preload';
    preloadLink.as = 'image';
    preloadLink.href = firstImageSrc;
    preloadLink.fetchPriority = 'high'; // ব্রাউজারকে সবচেয়ে বেশি গুরুত্ব দিতে বলা
    document.head.appendChild(preloadLink);

    // ৪. স্লাইডার কন্টেন্ট তৈরি করা
    let html = '';
    ids.forEach((id, index) => {
        // ১ম ইমেজকে fetchpriority এবং eager দেওয়া যাতে ফাস্ট লোড হয়
        const priority = index === 0 ? 'fetchpriority="high"' : '';
        const loadingMode = index < 2 ? 'eager' : 'lazy';

        html += `
        <div class="swiper-slide">
            <div class="product-card">
                <span class="badge">কোড: ${id}</span>
                <img src="${repo}${id}.webp" 
                     alt="হরিতকী শাড়ি কোড ${id}" 
                     ${priority} 
                     loading="${loadingMode}"
                     style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div class="actions">
                <button class="btn btn-details" onclick="openDrawer(${id})">বিস্তারিত</button>
                <button class="btn btn-order" onclick="openDrawer(${id})">অর্ডার দিন</button>
            </div>
        </div>`;
    });
    
    $('#mainWrapper').html(html);

    // ৫. Swiper স্লাইডার কনফিগারেশন
    const swiper = new Swiper('.swiper', {
        loop: true,
        navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
        on: {
            slideChange: function () {
                // পেজ উল্টানোর শব্দ
                snd.currentTime = 0; 
                snd.play().catch(()=>{});
                // পেজ নম্বর আপডেট
                $('#pCount').text((this.realIndex + 1) + '/' + total);
            }
        }
    });

    // সব রেডি হলে লোডার সরিয়ে দেওয়া
    $('#loader').fadeOut(300);

    // ফেসবুক পিক্সেল ডিলে লোড (স্পিড বাড়ানোর জন্য)
    setTimeout(() => {
        if(window.fbq) fbq('track', 'PageView');
    }, 2000);
});
    </script>
</body>
